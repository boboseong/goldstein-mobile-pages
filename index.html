<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>Goldstein Chapter 1 Mobile Reader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="단원 목록">
        <div class="brand">
          <div>
            <p class="eyebrow">Goldstein</p>
            <h1>Chapter 1 Reader</h1>
          </div>
          <span class="sync-pill" id="itemCount">0 files</span>
        </div>
        <label class="search-wrap">
          <i data-lucide="search" aria-hidden="true"></i>
          <span class="sr-only">검색</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="단원, 제목, 파일 검색" />
        </label>
        <nav class="section-list" id="sectionList"></nav>
      </aside>

      <main class="content" id="contentRoot">
        <header class="reader-header">
          <div>
            <p class="eyebrow" id="sectionMeta">Chapter 1</p>
            <h2 id="sectionTitle"></h2>
            <p class="subtle" id="sectionNote"></p>
          </div>
          <div class="view-tabs" role="tablist" aria-label="보기 전환">
            <button class="tab-button active" id="tabTranslation" type="button" data-kind="translation">
              <i data-lucide="sigma" aria-hidden="true"></i>
              <span>TR</span>
            </button>
            <button class="tab-button" id="tabTts" type="button" data-kind="tts">
              <i data-lucide="volume-2" aria-hidden="true"></i>
              <span>TTS</span>
            </button>
          </div>
        </header>

        <div class="entry-bar">
          <label class="select-label" for="entrySelect">파일</label>
          <select id="entrySelect"></select>
        </div>

        <article class="reader-surface" id="readerSurface"></article>
      </main>
    </div>

    <section class="tts-player" id="ttsPlayer" aria-label="TTS 재생 컨트롤">
      <div class="player-status">
        <span id="playerTitle">TTS 파일을 선택하세요</span>
        <span id="playerProgress"></span>
      </div>
      <div class="player-controls">
        <button class="icon-button" id="playButton" type="button" title="재생">
          <i data-lucide="play" aria-hidden="true"></i>
          <span class="sr-only">재생</span>
        </button>
        <button class="icon-button" id="pauseButton" type="button" title="일시정지">
          <i data-lucide="pause" aria-hidden="true"></i>
          <span class="sr-only">일시정지</span>
        </button>
        <button class="icon-button" id="stopButton" type="button" title="정지">
          <i data-lucide="square" aria-hidden="true"></i>
          <span class="sr-only">정지</span>
        </button>
        <label class="rate-control">
          <span>속도</span>
          <input id="rateInput" type="range" min="0.7" max="1.4" step="0.1" value="1" />
          <output id="rateOutput">1.0x</output>
        </label>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.0/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <script src="data/site-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
